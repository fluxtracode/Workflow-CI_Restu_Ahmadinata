name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: churn-model:latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn matplotlib seaborn

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          echo "Mencari run_id dari folder mlruns..."
          RUN_ID=$(ls mlruns/0 | grep -E '^[0-9a-f]{32}$' | head -n 1 || echo "not_found")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest MLflow Run ID: $RUN_ID"

      - name: Install Python dependencies
        run: |
          echo "Semua dependency Python utama sudah terinstal."

      - name: Upload to Github
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/saved_model/

      - name: Build Docker Model
        run: |
          # Mengakali bug MLflow
          MLFLOW_DIR=$(python -c "import mlflow; import os; print(os.path.dirname(mlflow.__file__))")
          find "$MLFLOW_DIR" -type f -name "*.py" -exec sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' {} +
          
          # Eksekusi build-docker asli
          cd MLProject
          mlflow models build-docker -m saved_model -n "$DOCKER_IMAGE"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag "$DOCKER_IMAGE" ${{ secrets.DOCKER_USERNAME }}/churn-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:latest